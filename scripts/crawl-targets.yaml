# Input manifest for the Playwright-driven site-rule extraction workflow.
#
# Consumed by an interactive crawl session (see CLAUDE.md branching workflow):
# for each site, the assistant visits the listed pages, identifies candidate
# selectors for each rule type, validates them against false-positive checks,
# and emits a draft `extension/data/sites/<slug>.yaml` per the schema in
# `extension/data/site-rules.schema.ts`.
#
# rule targets explained:
#   reviews-hide: a product/place page with a visible reviews section.
#   comments-hide: a page with a discussion thread or comments area.
#   footer-hide: any page — footer is global; use the homepage.
#   search-url-helper: the homepage (to submit a sample query and capture
#                      the resulting query-string contract).
#
# Sites where a rule type doesn't apply are omitted (e.g. DuckDuckGo has no
# reviews/comments).

sites:
  - slug: ebay
    hostnames: ["{*.}?ebay.com"]
    targets:
      reviews-hide: "https://www.ebay.com/b/Cell-Phones-Smartphones/9355/bn_320094"
      footer-hide: "https://www.ebay.com/"
      search-url-helper:
        form_page: "https://www.ebay.com/"
        sample_query: "wireless keyboard"

  - slug: stackoverflow
    hostnames: ["{*.}?stackoverflow.com"]
    targets:
      comments-hide: "https://stackoverflow.com/questions/11227809/why-is-processing-a-sorted-array-faster-than-processing-an-unsorted-array"
      footer-hide: "https://stackoverflow.com/"
      search-url-helper:
        form_page: "https://stackoverflow.com/"
        sample_query: "react useEffect cleanup"

  - slug: yelp
    hostnames: ["{*.}?yelp.com"]
    targets:
      reviews-hide: "https://www.yelp.com/biz/the-french-laundry-yountville"
      footer-hide: "https://www.yelp.com/"
      search-url-helper:
        form_page: "https://www.yelp.com/"
        sample_query: "coffee"
        sample_location: "San Francisco, CA"

  - slug: booking
    hostnames: ["{*.}?booking.com"]
    targets:
      reviews-hide: "https://www.booking.com/hotel/us/the-plaza.html"
      footer-hide: "https://www.booking.com/"
      search-url-helper:
        form_page: "https://www.booking.com/"
        sample_query: "Paris"

  - slug: tripadvisor
    hostnames: ["{*.}?tripadvisor.com"]
    targets:
      reviews-hide: "https://www.tripadvisor.com/Hotel_Review-g60763-d93589-Reviews-The_Plaza-New_York_City_New_York.html"
      footer-hide: "https://www.tripadvisor.com/"
      search-url-helper:
        form_page: "https://www.tripadvisor.com/"
        sample_query: "hotels in Paris"

  - slug: google-maps
    hostnames: ["{*.}?google.com"]
    pathnames: ["/maps/*"]
    targets:
      reviews-hide: "https://www.google.com/maps/place/Eiffel+Tower"
      search-url-helper:
        form_page: "https://www.google.com/maps"
        sample_query: "coffee near me"

  - slug: costco
    hostnames: ["{*.}?costco.com"]
    targets:
      reviews-hide: "https://www.costco.com/laptops.html"
      footer-hide: "https://www.costco.com/"
      search-url-helper:
        form_page: "https://www.costco.com/"
        sample_query: "laptop"

  - slug: nytimes
    hostnames: ["{*.}?nytimes.com"]
    targets:
      comments-hide: "https://www.nytimes.com/" # pick a current article with comments enabled
      footer-hide: "https://www.nytimes.com/"
      search-url-helper:
        form_page: "https://www.nytimes.com/"
        sample_query: "climate"

  - slug: goodreads
    hostnames: ["{*.}?goodreads.com"]
    targets:
      reviews-hide: "https://www.goodreads.com/book/show/3735293-clean-code"
      comments-hide: "https://www.goodreads.com/book/show/3735293-clean-code"
      footer-hide: "https://www.goodreads.com/"
      search-url-helper:
        form_page: "https://www.goodreads.com/"
        sample_query: "atomic habits"

  - slug: duckduckgo
    hostnames: ["{*.}?duckduckgo.com"]
    targets:
      search-url-helper:
        form_page: "https://duckduckgo.com/"
        sample_query: "playwright mcp"

# Per-site extraction recipe (applied uniformly):
#
# 1. Navigate to the target page; wait for load + a short settle.
# 2. For *-hide rules: identify the top-level container that wraps the
#    review/comment/footer content. Prefer signals that decay slowly:
#      a. schema.org microdata (`[itemtype*="Review"]`, `[itemscope][itemtype]`)
#      b. ARIA landmarks/roles (`role="contentinfo"` for footer, `role="region"`
#         with `aria-label` matching /review|comment/i)
#      c. Semantic HTML (`<footer>`)
#      d. Stable ids/data attributes (`#reviewsMedley`, `[data-testid*="review"]`)
#      e. Class names (last resort — most likely to drift)
#    Reject any candidate that, when removed, also removes the primary content
#    node (`<main>`, `<article>`, the product title, etc.).
# 3. For search-url-helper: submit the sample query in the form on the form_page,
#    capture the resulting URL, decompose into base path + parameter contract.
#    Optionally click sort/filter UIs to discover additional parameter keys.
# 4. Emit `extension/data/sites/<slug>.yaml` per the schema in
#    `extension/data/site-rules.schema.ts`; run `bun run build-site-data` to
#    confirm the YAML is valid.
# 5. One branch + PR per site: `crawl/<slug>-rules` off main.
