name: Release extension

on:
  workflow_dispatch:
    inputs:
      publish_chrome_web_store:
        description: "Submit to Chrome Web Store for publication"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-extension
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish extension release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Compute version
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # CalVer + GitHub Actions run_number. Chrome accepts up to 4 integer
          # segments and compares them numerically, so a monotonically
          # increasing run_number guarantees every release looks "newer" to
          # Chrome's auto-update — even multiple releases on the same day.
          version="$(date -u +%Y.%-m.%-d).${RUN_NUMBER}"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${tag} (manifest version ${version})"

      - name: Patch manifest version
        working-directory: extension
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # CI is the source of truth for shipped versions; the version field
          # in src/manifest.json is a dev placeholder for unpacked loads.
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src/manifest.json > "$tmp"
          mv "$tmp" src/manifest.json
          jq '{version, name}' src/manifest.json

      - name: Install dependencies
        working-directory: extension
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: extension
        run: bun run build
      - name: Package extension zip
        working-directory: extension
        run: bun run package

      - name: Upload extension zip as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-zip-${{ steps.version.outputs.tag }}
          path: output/agent-browser-shield-extension.zip
          archive: false
          if-no-files-found: error
          retention-days: 30

      # CWS rejects manifests containing a "key" field; produce a sibling zip
      # with it stripped. The GitHub Release zip still includes "key" if/when
      # one is added, so consumers wanting a stable extension ID (e.g.,
      # Browserbase) aren't affected.
      - name: Package CWS-ready zip
        if: ${{ inputs.publish_chrome_web_store }}
        working-directory: extension
        run: bun run package:cws

      - name: Publish to Chrome Web Store
        if: ${{ inputs.publish_chrome_web_store }}
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source output/extension-cws.zip \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
          npx --yes chrome-webstore-upload-cli@3 publish \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            output/agent-browser-shield-extension.zip \
            --title "$TAG" \
            --generate-notes \
            --target "$GITHUB_SHA"
