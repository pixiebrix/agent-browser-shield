name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension:
    name: Extension (lint / typecheck / test / build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (Biome + ESLint)
        run: bun run check
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Package extension zip
        run: bun run package
      - name: Upload extension zip
        uses: actions/upload-artifact@v7
        with:
          path: output/extension.zip
          archive: false
          if-no-files-found: error

      # CWS rejects manifests containing a "key" field. Emit a sibling zip with
      # "key" stripped so the initial CWS listing (and any manual re-uploads)
      # can use a known-good CI build instead of a one-off local build.
      - name: Package CWS-ready zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run package:cws
      - name: Upload CWS-ready zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: extension-cws-zip
          path: output/extension-cws.zip
          archive: false
          if-no-files-found: error

  demo-site:
    name: Demo site (build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: demo-site
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build

  docs:
    name: Docs site (build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install extension dependencies
        run: bun install --frozen-lockfile
        working-directory: extension
      - uses: pre-commit/action@v3.0.1

  python:
    name: Python (ruff + bandit)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.14
      - name: Ruff lint
        run: uvx ruff check scripts/
      - name: Ruff format check
        run: uvx ruff format --check scripts/
      - name: Bandit security scan
        run: uvx --from "bandit[toml]" bandit -c pyproject.toml -r scripts/
