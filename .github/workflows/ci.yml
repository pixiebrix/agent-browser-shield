name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension:
    name: Extension (lint / typecheck / test / build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # Belt-and-suspenders alongside --frozen-lockfile: if the install
      # somehow mutated either file, the commit is incomplete. Agents bumping
      # a dep in package.json without committing the resulting bun.lock
      # update (or vice versa) is the failure mode this guards against.
      - name: Lockfile drift gate
        run: |
          if ! git diff --exit-code -- bun.lock package.json; then
            echo "::error::package.json or bun.lock was modified by \`bun install --frozen-lockfile\` — your lockfile is out of sync. Run \`bun install\` locally and commit both files."
            exit 1
          fi
      # Single delegation point: preflight is what contributors run locally
      # (see CONTRIBUTING.md). Adding a check there picks it up here for free.
      # Codegen freshness is its own step because preflight regenerates the
      # files internally — the diff has to be captured against pristine git
      # state before preflight runs.
      - name: Codegen freshness (site data + injection patterns)
        run: |
          bun run build-site-data
          bun run build-injection-patterns
          if ! git diff --exit-code -- src/rules/site-data.generated.ts src/rules/injection-patterns.generated.ts; then
            echo "::error::Generated files are out of date. Run \`bun run build-site-data && bun run build-injection-patterns\` locally and commit the result."
            exit 1
          fi
      - name: Preflight (lint + typecheck + knip + test with coverage)
        run: bun run preflight
      - name: Build
        run: bun run build
      - name: Package extension zip
        run: bun run package
      - name: Upload extension zip
        uses: actions/upload-artifact@v7
        with:
          path: output/agent-browser-shield-extension.zip
          archive: false
          if-no-files-found: error
          retention-days: 30

      # CWS rejects manifests containing a "key" field. Emit a sibling zip with
      # "key" stripped so the initial CWS listing (and any manual re-uploads)
      # can use a known-good CI build instead of a one-off local build.
      - name: Package CWS-ready zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run package:cws
      - name: Upload CWS-ready zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: extension-cws-zip
          path: output/extension-cws.zip
          archive: false
          if-no-files-found: error

  demo-site:
    name: Demo site (check / build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: demo-site
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lockfile drift gate
        run: |
          if ! git diff --exit-code -- bun.lock package.json; then
            echo "::error::package.json or bun.lock was modified by \`bun install --frozen-lockfile\` — your lockfile is out of sync. Run \`bun install\` locally and commit both files."
            exit 1
          fi
      - name: Check (Biome format + lint)
        run: bun run check
      - name: Build
        run: bun run build

  docs:
    name: Docs site (check / build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lockfile drift gate
        run: |
          if ! git diff --exit-code -- bun.lock package.json; then
            echo "::error::package.json or bun.lock was modified by \`bun install --frozen-lockfile\` — your lockfile is out of sync. Run \`bun install\` locally and commit both files."
            exit 1
          fi
      # `astro build` does not type-check .astro frontmatter; `astro check` does.
      # `biome check .` covers .ts/.tsx/.json under docs/ via the root biome.json.
      - name: Check (astro check + Biome)
        run: bun run check
      - name: Build
        run: bun run build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.14'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install extension dependencies
        run: bun install --frozen-lockfile
        working-directory: extension
      - name: Install demo-site dependencies
        run: bun install --frozen-lockfile
        working-directory: demo-site
      - uses: pre-commit/action@v3.0.1

  python:
    name: Python (ruff + bandit + pyright + pytest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
          # Full history so the strict-on-new-files ratchet below can compute
          # `origin/<base>...HEAD` — the default shallow checkout lacks the
          # merge base on most PRs.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Set up Python
        run: uv python install 3.14
      - name: Ruff lint
        run: uvx ruff check scripts/
      - name: Ruff format check
        run: uvx ruff format --check scripts/
      - name: Bandit security scan
        run: uvx --from "bandit[toml]" bandit -c pyproject.toml -r scripts/
      # Pyright config lives in pyproject.toml `[tool.pyright]`; standard mode
      # with import resolution disabled (PEP 723 inline-deps aren't installed
      # into a shared venv). Ratchet up via per-file `# pyright: strict`.
      - name: Pyright type check
        run: uvx pyright
      # Pytest covers the pure helpers shared across the benchmark loop
      # (`_judge`, `_blockcheck`, `_stagehand`, `compare_scenarios`). The
      # `--with` packages match what's imported at module load time of any
      # helper a test pulls in (`python-dotenv` for compare_scenarios).
      - name: Pytest (scripts/ helpers)
        run: uvx --with pytest --with python-dotenv pytest
      # New-file ratchet: every newly-added Python file must opt in to
      # `# pyright: strict`. Stops legacy debt in scripts/ from growing
      # while we leave the global mode at standard. base_ref is passed via
      # env so it isn't expanded inside the shell (zizmor template-injection).
      - name: Pyright strict-on-new-files ratchet
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: uv run scripts/check_pyright_strict_on_new_files.py "origin/$BASE_REF"
