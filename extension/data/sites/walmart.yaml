hostnames:
  - "{*.}?walmart.com"

rules:
  reviews-hide:
    # Keep the inline aggregate (`[data-testid="reviews-and-ratings"]`) near
    # the product title visible — it's a rating summary, not user-generated
    # content. Only hide sections that contain UGC.
    selectors:
      - "#item-review-section"
      - '[data-testid="seller-ratings-and-reviews"]'
      - '[data-testid="enhanced-review-section"]'
