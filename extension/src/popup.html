<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agent Browser Shield</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #222;
      }
      body {
        margin: 0;
        width: 280px;
      }
      .popup {
        padding: 12px 14px;
      }
      .popup h1 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
      }
      .rules {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rules label {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        cursor: pointer;
        padding: 6px;
        border-radius: 4px;
      }
      .rules label:hover {
        background: #f4f4f5;
      }
      .rules input {
        margin-top: 2px;
      }
      .rules strong {
        display: block;
        font-weight: 600;
      }
      .rules p {
        margin: 2px 0 0;
        font-size: 11px;
        color: #666;
        line-height: 1.3;
      }
      .rules .rule--unavailable label {
        cursor: not-allowed;
      }
      .rules .rule--unavailable strong,
      .rules .rule--unavailable p {
        color: #999;
      }
      .rules .rule--unavailable input {
        cursor: not-allowed;
      }
      .rules .unavailable-reason {
        margin: 2px 0 0;
        font-style: italic;
        color: #92400e;
      }
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #92400e;
        background: #fef3c7;
        border: 1px solid #fde68a;
        border-radius: 3px;
        vertical-align: middle;
      }
      .loading {
        padding: 14px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
