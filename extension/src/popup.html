<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agent Browser Shield</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #222;
      }
      body {
        margin: 0;
        width: 280px;
      }
      .popup {
        padding: 12px 14px;
      }
      .popup h1 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
      }
      .enforcement {
        margin: 0 0 12px;
        padding: 8px 10px;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        background: #fafafa;
      }
      .enforcement--on {
        border-color: #bfdbfe;
        background: #eff6ff;
      }
      .enforcement--off {
        border-color: #fde68a;
        background: #fffbeb;
      }
      .enforcement__label {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        margin: 0;
      }
      .enforcement__text {
        display: inline-flex;
        flex-direction: column;
        gap: 1px;
        flex: 1;
      }
      .enforcement__text strong {
        font-size: 13px;
      }
      .enforcement__state {
        font-size: 11px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .enforcement--off .enforcement__state {
        color: #92400e;
      }
      .enforcement__hint {
        margin: 6px 0 0;
        font-size: 11px;
        color: #92400e;
        line-height: 1.3;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 32px;
        height: 18px;
        flex: none;
      }
      .switch input {
        position: absolute;
        inset: 0;
        opacity: 0;
        margin: 0;
        cursor: pointer;
      }
      .switch__track {
        position: absolute;
        inset: 0;
        background: #d4d4d8;
        border-radius: 999px;
        transition: background 120ms ease;
      }
      .switch__track::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        transition: transform 120ms ease;
      }
      .switch input:checked + .switch__track {
        background: #2563eb;
      }
      .switch input:checked + .switch__track::after {
        transform: translateX(14px);
      }
      .switch input:focus-visible + .switch__track {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }
      .detections {
        margin: 0 0 12px;
      }
      .detections__heading {
        margin: 0 0 6px;
        padding-bottom: 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #555;
        border-bottom: 1px solid #e4e4e7;
      }
      .detections__empty {
        margin: 0;
        font-size: 11px;
        color: #888;
      }
      .detections__list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .detection {
        padding: 8px 10px;
        border: 1px solid #fde68a;
        background: #fffbeb;
        border-radius: 6px;
        font-size: 12px;
      }
      .detection strong {
        display: block;
        font-weight: 600;
        color: #92400e;
      }
      .detection__host {
        margin: 2px 0 0;
        font-size: 11px;
        color: #555;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .detection__detail {
        margin: 4px 0 0;
        font-size: 11px;
        color: #666;
        line-height: 1.3;
      }
      .detection__cancel {
        display: inline-block;
        margin: 4px 0 0;
        font-size: 11px;
        color: #2563eb;
        text-decoration: none;
      }
      .detection__cancel:hover {
        text-decoration: underline;
      }
      .detection__source {
        margin: 4px 0 0;
        font-size: 10px;
        color: #888;
      }
      .rule-groups {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .rule-groups--enforcement-off {
        opacity: 0.55;
      }
      .rule-group__heading {
        margin: 0 0 6px;
        padding-bottom: 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #555;
        border-bottom: 1px solid #e4e4e7;
      }
      .rules {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rules label {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        cursor: pointer;
        padding: 6px;
        border-radius: 4px;
      }
      .rules label:hover {
        background: #f4f4f5;
      }
      .rules input {
        margin-top: 2px;
      }
      .rules strong {
        display: block;
        font-weight: 600;
      }
      .rules p {
        margin: 2px 0 0;
        font-size: 11px;
        color: #666;
        line-height: 1.3;
      }
      .rules .rule--unavailable label {
        cursor: not-allowed;
      }
      .rules .rule--unavailable strong,
      .rules .rule--unavailable p {
        color: #999;
      }
      .rules .rule--unavailable input {
        cursor: not-allowed;
      }
      .rules .unavailable-reason {
        margin: 2px 0 0;
        font-style: italic;
        color: #92400e;
      }
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #92400e;
        background: #fef3c7;
        border: 1px solid #fde68a;
        border-radius: 3px;
        vertical-align: middle;
      }
      .options-button-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 12px 0 0;
        padding: 8px 10px;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        background: #fafafa;
        cursor: pointer;
      }
      .options-button-toggle__text {
        flex: 1;
        display: inline-flex;
        flex-direction: column;
        gap: 2px;
      }
      .options-button-toggle__text strong {
        font-size: 13px;
      }
      .options-button-toggle__hint {
        font-size: 11px;
        color: #666;
        line-height: 1.3;
      }
      .loading {
        padding: 14px;
        color: #888;
      }
      .popup__footer {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #e4e4e7;
        text-align: center;
        font-size: 11px;
        color: #888;
      }
      .popup__footer a {
        color: #2563eb;
        text-decoration: none;
      }
      .popup__footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
