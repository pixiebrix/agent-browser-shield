<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agent Browser Shield — Options</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #222;
      }
      body {
        margin: 0;
        background: #fafafa;
      }
      .options {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 20px 48px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .options h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }
      .options h2 {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #555;
      }
      .options h2 .anchor {
        color: #c4c4c8;
        text-decoration: none;
        margin-right: 6px;
        font-weight: 400;
      }
      .options h2 .anchor:hover {
        color: #2563eb;
      }
      .toc {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        padding: 12px 16px;
        background: #f4f4f5;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        font-size: 12px;
      }
      .toc a {
        color: #2563eb;
        text-decoration: none;
      }
      .toc a:hover {
        text-decoration: underline;
      }
      .section {
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        padding: 16px;
        scroll-margin-top: 16px;
      }
      .hint {
        margin: 0 0 12px;
        font-size: 12px;
        color: #666;
        line-height: 1.4;
      }
      .rules {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rules label {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        cursor: pointer;
        padding: 6px;
        border-radius: 4px;
      }
      .rules label:hover {
        background: #f4f4f5;
      }
      .rules input {
        margin-top: 2px;
      }
      .rules strong {
        display: block;
        font-weight: 600;
      }
      .rules p {
        margin: 2px 0 0;
        font-size: 11px;
        color: #666;
        line-height: 1.3;
      }
      .rules .rule--unavailable label {
        cursor: not-allowed;
      }
      .rules .rule--unavailable strong,
      .rules .rule--unavailable p {
        color: #999;
      }
      .rules .rule--unavailable input {
        cursor: not-allowed;
      }
      .rules .unavailable-reason {
        margin: 2px 0 0;
        font-style: italic;
        color: #92400e;
      }
      .badge {
        display: inline-block;
        margin-left: 6px;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #92400e;
        background: #fef3c7;
        border: 1px solid #fde68a;
        border-radius: 3px;
        vertical-align: middle;
      }
      .json-view {
        margin: 0 0 12px;
        padding: 10px 12px;
        background: #f4f4f5;
        border: 1px solid #e4e4e7;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre;
        overflow: auto;
        max-height: 320px;
      }
      .json-input {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        margin: 0 0 12px;
        border: 1px solid #d4d4d8;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.5;
        resize: vertical;
      }
      .json-input:focus {
        outline: 2px solid #2563eb;
        outline-offset: -1px;
        border-color: transparent;
      }
      .api-key-input {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 8px 12px;
        margin: 0 0 12px;
        border: 1px solid #d4d4d8;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
      .api-key-input:focus {
        outline: 2px solid #2563eb;
        outline-offset: -1px;
        border-color: transparent;
      }
      button {
        font: inherit;
        padding: 6px 12px;
        background: #18181b;
        color: #fff;
        border: 0;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #27272a;
      }
      button.secondary {
        background: #fff;
        color: #18181b;
        border: 1px solid #d4d4d8;
      }
      button.secondary:hover {
        background: #f4f4f5;
      }
      .button-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .status {
        font-size: 12px;
        color: #16a34a;
      }
      .error {
        margin: 0 0 12px;
        padding: 10px 12px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 4px;
        color: #b91c1c;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .loading {
        padding: 14px;
        color: #888;
      }
      .section.section--unavailable {
        background: #fafafa;
      }
      .radio-group {
        border: 0;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .radio {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        cursor: pointer;
        padding: 6px;
        border-radius: 4px;
      }
      .radio:hover {
        background: #f4f4f5;
      }
      .radio input {
        margin-top: 2px;
      }
      .radio strong {
        display: block;
        font-weight: 600;
      }
      .radio p {
        margin: 2px 0 0;
        font-size: 11px;
        color: #666;
        line-height: 1.3;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .section.section--unavailable .api-key-input,
      .section.section--unavailable button {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .footer {
        margin-top: 8px;
        padding-top: 16px;
        border-top: 1px solid #e4e4e7;
        text-align: center;
        font-size: 11px;
        color: #888;
      }
      .footer__links {
        margin-bottom: 6px;
      }
      .footer__links a {
        color: #2563eb;
        text-decoration: none;
      }
      .footer__links a:hover {
        text-decoration: underline;
      }
      .footer__copyright {
        color: #888;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="options.js"></script>
  </body>
</html>
