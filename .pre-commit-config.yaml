repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
        args: ['--allow-multiple-documents']
      - id: check-json
        name: Check JSON syntax
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: \.generated\.(ts|tsx|js|jsx)$
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: \.generated\.(ts|tsx|js|jsx)$

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: [--number]
        additional_dependencies:
          - mdformat-frontmatter
          - mdformat-gfm
        exclude: (node_modules|\.venv)/

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        name: Lint Markdown files

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        name: Insert copyright header (TS/JS)
        files: \.(ts|tsx|js|mjs|cjs)$
        # __tests__/ is excluded because Jest's `@jest-environment` /
        # `@jest-environment-options` docblock pragmas must live in the first
        # comment block at the top of the file â€” a preceding `//` header
        # silently disables them.
        exclude: \.generated\.(ts|tsx|js|mjs|cjs)$|/\.astro/|/dist/|/node_modules/|\.d\.ts$|/__tests__/
        args:
          - --license-filepath
          - HEADER.txt
          - --comment-style
          - //
      - id: insert-license
        name: Insert copyright header (CSS)
        files: \.css$
        exclude: \.generated\.css$|/dist/|/node_modules/
        args:
          - --license-filepath
          - HEADER.txt
          - --comment-style
          - /*| *| */
      - id: insert-license
        name: Insert copyright header (Python)
        files: \.py$
        exclude: /\.venv/|/\.ruff_cache/|/__pycache__/
        args:
          - --license-filepath
          - HEADER.txt
          - --comment-style
          - "#"

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.5.2
    hooks:
      - id: biome-check
        name: Biome check (format + lint)
        additional_dependencies: ["@biomejs/biome@2.5.1"]
        # File scope here mirrors the `includes` in the root `biome.json`. Keep
        # them in sync â€” Biome resolves its own scope from biome.json; the regex
        # below is purely to skip invoking the hook on irrelevant changes.
        files: ^(extension|demo-site)/.*\.(ts|tsx|js|jsx|mjs|cjs|json|jsonc|css)$|^docs/.*\.(ts|tsx|json|jsonc)$
        exclude: /(dist|node_modules|\.astro)/|\.generated\.(ts|tsx|js|jsx)$

  - repo: local
    hooks:
      - id: eslint
        name: ESLint (extension â€” unicorn + custom)
        language: system
        entry: bash -c 'cd extension && bun run lint:eslint'
        files: ^extension/.*\.(ts|tsx|js|mjs|cjs)$
        exclude: ^extension/dist/|\.generated\.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: eslint-demo-site
        name: ESLint (demo-site â€” prevent-abbreviations)
        language: system
        entry: bash -c 'cd demo-site && bun run lint:eslint'
        files: ^demo-site/.*\.(ts|tsx|js|mjs|cjs)$
        exclude: ^demo-site/dist/
        pass_filenames: false
      # Stylelint lints CSS that Biome doesn't reach: the <style> blocks inside
      # extension/src/*.html and the demo-site stylesheet. Each hook globs via
      # its package script (pass_filenames: false), so the regex only decides
      # when to invoke. docs/ has no hook here â€” the pre-commit CI job installs
      # only extension + demo-site deps; docs CSS is covered by the docs CI check.
      - id: stylelint
        name: Stylelint (extension â€” popup/options CSS)
        language: system
        entry: bash -c 'cd extension && bun run lint:stylelint'
        files: ^extension/src/.*\.(css|html)$
        exclude: ^extension/dist/|\.generated\.
        pass_filenames: false
      - id: stylelint-demo-site
        name: Stylelint (demo-site CSS)
        language: system
        entry: bash -c 'cd demo-site && bun run lint:stylelint'
        files: ^demo-site/src/.*\.css$
        exclude: ^demo-site/dist/
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        name: Ruff lint
        args: [--fix]
      - id: ruff-format
        name: Ruff format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: Bandit (Python security)
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^scripts/.*\.py$

  # Pyright runs against the whole `scripts/` tree (config in pyproject.toml)
  # â€” file-scoped invocation would miss cross-file inference. The PyPI
  # `pyright` package wraps the node binary and downloads it on first run,
  # so the hook works in any pre-commit environment without a system `uvx`.
  - repo: local
    hooks:
      - id: pyright
        name: Pyright (Python type check)
        language: python
        entry: pyright
        additional_dependencies: ["pyright==1.1.410"]
        files: ^scripts/.*\.py$|^pyproject\.toml$
        pass_filenames: false

  # Pytest runs the full suite (config in pyproject.toml `[tool.pytest.ini_options]`)
  # so cross-file imports and conftest sys.path injection resolve consistently.
  # The python-dotenv dep matches `compare_scenarios`'s module-level import.
  - repo: local
    hooks:
      - id: pytest
        name: Pytest (scripts/ helpers)
        language: python
        entry: pytest
        additional_dependencies: ["pytest>=8", "python-dotenv>=1"]
        files: ^scripts/.*\.py$|^pyproject\.toml$
        pass_filenames: false

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflows
